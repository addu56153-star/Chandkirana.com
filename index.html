  <style>
    *{

      box-sizing:border-box;

    body{
      background:#f8f8f8;
      color:#222;
    }

    header{
      background:#b80000;
      color:#fff;
      text-align:center;
      padding:14px;

      display:flex;

    }

    .categories::-webkit-scrollbar{

    }

    .categories a{

      background:#fff;
      border-radius:20px;
      padding:10px 16px;
      white-space:nowrap;

    }

    .categories a:first-child{
      background:#c70000;
      color:#fff;
    }

    .whatsapp{
      display:block;
      width:max-content;
      margin:20px auto;
      background:#25D366;
      color:#fff;
      text-decoration:none;
      padding:14px 22px;
      border-radius:8px;
      font-weight:bold;
    }

    footer{
      background:#111;
      color:#fff;
      text-align:center;
      padding:18px;
